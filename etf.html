<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>ETF Detail</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<meta name="theme-color" content="#ffffff">
<link rel="stylesheet" href="style.css">
</head>
<body>
<header>
  <div>
    <a class="back-link" href="index.html">← Top 10</a>
  </div>
  <button class="icon-btn" id="refresh-btn">↻ Refresh</button>
</header>
<div class="status-bar" id="status-bar"></div>
<main>
  <div id="detail-root">
    <div class="skeleton" style="height:160px"></div>
  </div>
</main>

<script src="app.js"></script>
<script>
function getId() {
  return new URLSearchParams(window.location.search).get("id");
}

function renderHoldingsSection(holdingsData) {
  if (!holdingsData) {
    return `
      <div class="placeholder-box">
        <strong>Holdings add/cut tracking — not built yet for this fund.</strong><br>
        Tell Claude to wire up this issuer's disclosure page and it'll find and parse it specifically.
      </div>
    `;
  }

  const { snapshot_date, previous_snapshot_date, holdings, changes } = holdingsData;
  const changeRow = (h, kind) => {
    const cls = kind === "added" ? "" : kind === "removed" ? "neg" : h.delta_pct > 0 ? "" : "neg";
    const detail =
      kind === "added" ? `new, ${h.weight_pct.toFixed(2)}%`
      : kind === "removed" ? `was ${h.weight_pct.toFixed(2)}%`
      : `${h.prev_weight_pct.toFixed(2)}% → ${h.weight_pct.toFixed(2)}%`;
    return `
      <div class="stat-row">
        <span class="label">${h.name} (${h.code})</span>
        <span class="pct ${cls}" style="font-size:14px">${kind === "changed" ? fmtPct(h.delta_pct) : (kind === "added" ? "+ added" : "− removed")} <span style="color:var(--muted);font-weight:400">${detail}</span></span>
      </div>
    `;
  };

  const hasChanges = changes.added.length || changes.removed.length || changes.changed.length;
  const changesBlock = !previous_snapshot_date
    ? `<div class="placeholder-box">First snapshot taken (${snapshot_date}) — no prior day to compare against yet. Changes will show up starting the next data refresh.</div>`
    : !hasChanges
    ? `<div class="placeholder-box">No holdings changes since ${previous_snapshot_date}.</div>`
    : `
      <div class="detail-card">
        <h3 style="margin:0 0 8px;font-size:15px">Changes since ${previous_snapshot_date}</h3>
        ${changes.added.map((h) => changeRow(h, "added")).join("")}
        ${changes.removed.map((h) => changeRow(h, "removed")).join("")}
        ${changes.changed.map((h) => changeRow(h, "changed")).join("")}
      </div>
    `;

  const holdingsTable = `
    <div class="detail-card">
      <h3 style="margin:0 0 8px;font-size:15px">Holdings as of ${snapshot_date} (${holdings.length} stocks)</h3>
      ${holdings
        .map(
          (h) => `
        <div class="stat-row">
          <span class="label">${h.name} (${h.code})</span>
          <span>${h.weight_pct.toFixed(2)}%</span>
        </div>`
        )
        .join("")}
    </div>
  `;

  return changesBlock + holdingsTable;
}

async function renderDetail(data, holdingsData) {
  const id = getId();
  const etf = data.top10.find((e) => e.stock_id === id);
  const root = document.getElementById("detail-root");
  if (!etf) {
    root.innerHTML = `<div class="placeholder-box">No data found for ${id}. It may have dropped out of the top 10 — go back and pick a current one.</div>`;
    return;
  }
  const negClass = etf.ytd_return_pct < 0 ? "neg" : "";
  root.innerHTML = `
    <div class="detail-card">
      <div class="id" style="color:var(--muted);font-size:13px">${etf.stock_id}</div>
      <h2 style="margin:4px 0 12px">${etf.stock_name}</h2>
      <div class="big-pct ${negClass}">${fmtPct(etf.ytd_return_pct)}</div>
      <div style="color:var(--muted);font-size:12px;margin-bottom:12px">YTD price return</div>
      <div class="stat-row"><span class="label">Baseline (${etf.baseline_date})</span><span>${etf.baseline_close}</span></div>
      <div class="stat-row"><span class="label">Latest close</span><span>${etf.latest_close}</span></div>
      <div class="stat-row"><span class="label">Latest volume</span><span>${fmtVolume(etf.latest_volume)}</span></div>
      <div class="stat-row"><span class="label">As of</span><span>${data.latest_trading_date_roc}</span></div>
    </div>
    ${renderHoldingsSection(holdingsData)}
  `;
}

function setStatus(msg, isError = false) {
  const bar = document.getElementById("status-bar");
  bar.textContent = msg;
  bar.className = "status-bar" + (isError ? " error" : "");
}

let lastData = null;
async function init(fresh = false) {
  try {
    lastData = fresh ? await loadRankingFresh() : await loadRanking();
    let holdingsData = null;
    try {
      holdingsData = await loadHoldings(getId());
    } catch (_) {
      // holdings fetch failing shouldn't block the price detail from showing
    }
    await renderDetail(lastData, holdingsData);
    setStatus("");
  } catch (e) {
    setStatus("Failed to load data: " + e.message, true);
  }
}

document.getElementById("refresh-btn").addEventListener("click", async () => {
  document.getElementById("refresh-btn").disabled = true;
  const ok = await triggerRefresh(setStatus);
  if (ok) {
    await init(true);
    setTimeout(() => setStatus(""), 3000);
  }
  document.getElementById("refresh-btn").disabled = false;
});

if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js").catch(() => {});
}

init();
</script>
</body>
</html>
