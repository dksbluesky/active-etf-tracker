name: Update ETF ranking data

on:
  workflow_dispatch: {}
  schedule:
    - cron: "30 7 * * 1-5"  # ~15:30 Taipei time, after TWSE market close, weekdays

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Fetch ranking data
        run: python scripts/fetch_ranking.py
      - name: Commit data if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/active_etf_ranking.json data/jan_baseline_cache.json
          git diff --quiet --cached || git commit -m "Update active ETF ranking data"
          git push
